<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Cedar | Sign In</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <!-- Tailwind CSS & Config -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="tailwind-config.js"></script>
    
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
</head>
<body class="bg-cedar-alabaster text-cedar-midnight font-body antialiased selection:bg-cedar-bronze/30 overflow-hidden h-screen flex">
    
    <!-- Left: Auth Form -->
    <div class="w-full lg:w-1/2 h-full flex flex-col pt-8 px-6 sm:px-12 md:px-24 justify-between bg-white overflow-y-auto">
        <!-- Logo -->
        <a href="index.html" class="flex items-center gap-3 w-fit group">
            <div class="w-8 h-8 rounded-lg bg-cedar-forest flex justify-center items-center text-white font-headline font-bold italic group-hover:bg-cedar-forest-dark transition-colors">
                C
            </div>
            <div class="font-headline text-2xl font-bold tracking-tight text-cedar-forest">Cedar</div>
        </a>
        
        <!-- Login Box -->
        <div class="w-full max-w-md mx-auto my-auto py-12">
            <div class="mb-10 text-center lg:text-left">
                <span class="block text-xs uppercase tracking-[0.3em] text-cedar-bronze font-semibold mb-4">Welcome Back</span>
                <h1 class="font-headline text-4xl font-bold text-cedar-midnight mb-2">Sign in to Cedar</h1>
                <p class="text-cedar-slate text-sm">Curate your legacy. Access your dashboard and portfolios.</p>
            </div>
            
            <form class="space-y-5" action="dashboard.html">
                <div>
                    <label class="block text-xs font-bold text-cedar-midnight uppercase tracking-widest mb-2" for="email">Email Address</label>
                    <input id="email" type="email" placeholder="hello@example.com" required class="w-full p-4 rounded-xl border border-black/10 bg-cedar-alabaster/50 font-body text-base outline-none focus:border-cedar-bronze focus:ring-4 focus:ring-cedar-bronze/10 transition-all text-cedar-midnight">
                </div>
                
                <div>
                    <div class="flex justify-between items-end mb-2">
                        <label class="block text-xs font-bold text-cedar-midnight uppercase tracking-widest" for="password">Password</label>
                        <a href="forgot_password.html" class="text-xs font-semibold text-cedar-forest hover:text-cedar-forest-dark transition-colors">Forgot password?</a>
                    </div>
                    <div class="relative">
                        <input id="password" type="password" placeholder="••••••••" required class="w-full p-4 rounded-xl border border-black/10 bg-cedar-alabaster/50 font-body text-base outline-none focus:border-cedar-bronze focus:ring-4 focus:ring-cedar-bronze/10 transition-all text-cedar-midnight">
                        <button type="button" class="absolute right-4 top-1/2 -translate-y-1/2 text-cedar-slate hover:text-cedar-midnight focus:outline-none">
                            <span class="material-symbols-outlined text-[20px]">visibility_off</span>
                        </button>
                    </div>
                </div>
                
                <div class="flex items-center pt-2">
                    <input id="remember" type="checkbox" class="w-4 h-4 rounded border-black/20 text-cedar-forest focus:ring-cedar-bronze/30 bg-cedar-alabaster">
                    <label for="remember" class="ml-2 text-sm text-cedar-slate">Keep me signed in</label>
                </div>
                
                <div class="pt-4">
                    <button type="submit" class="w-full flex justify-center items-center gap-2 bg-cedar-forest text-white py-4 rounded-xl font-bold text-base shadow-[0_4px_20px_rgba(27,48,34,0.15)] hover:bg-cedar-forest-dark hover:-translate-y-0.5 transition-all">
                        Sign In <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
                    </button>
                </div>
                
                <div class="pt-6 text-center text-sm text-cedar-slate">
                    Don't have an account yet? 
                    <a href="signup.html" class="font-bold text-cedar-forest hover:underline">Create an account</a>
                </div>
            </form>
        </div>
        
        <!-- Footer snippet -->
        <div class="pb-8 text-center lg:text-left text-xs font-medium text-cedar-slate">
            © 2026 Cedar. <a href="privacy.html" class="hover:text-cedar-midnight">Privacy</a> • <a href="terms.html" class="hover:text-cedar-midnight">Terms</a>
        </div>
    </div>
    
    <!-- Right: Visual Cover -->
    <div class="hidden lg:flex lg:w-1/2 relative bg-cedar-forest flex-col justify-between p-12 overflow-hidden border-l border-black/5">
        <img class="absolute inset-0 w-full h-full object-cover opacity-80 mix-blend-overlay" data-alt="architectural clean interior" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC72iK9ea6YugkWIKJMvCiAGJb5e3GZ6tqmw6a3uiIpubdh-frwlZav_0kldfOk7KCFOEJzdrMjUsCfCMORQkt4RbJCBGmVfxtkPxbHFl8roiorGeL6RLkYfp0P03Bq1o2bnsVR-hb8AHsvv1F-pCvu67Cgs9GhVw1lCkAUzI9abfwcPvpxzHem9o2ZOb2znCjADWk4NANU6kac7ZuaBBXxU8plphO0We2ui-vXPEq5myrRRbWHtcTmyTSeR2Gtg0uTLfQKD5VoViyx"/>
        
        <div class="absolute inset-0 bg-gradient-to-t from-cedar-midnight/90 via-transparent to-transparent"></div>
        
        <div class="relative z-10 flex justify-end w-full">
            <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-white/10 backdrop-blur-md border border-white/10">
                <div class="w-1.5 h-1.5 rounded-full bg-cedar-bronze animate-pulse shadow-[0_0_8px_#AA8C55]"></div>
                <span class="text-xs font-semibold text-white uppercase tracking-widest">Platform Operational</span>
            </div>
        </div>
        
        <div class="relative z-10 mb-10 max-w-lg">
            <h2 class="font-headline text-4xl font-bold text-white mb-4 line-clamp-3">
                "The only builder that respects the negative space."
            </h2>
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-white/20 overflow-hidden backdrop-blur-sm">
                    <img class="w-full h-full object-cover grayscale" data-alt="portrait" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCz7R0o4_SwDScB_gU1LxAzSxZhpqjml-7YKu3L6IgONXpA4Bcq6I_aPRXl1eQyo0z6wCPJ8YChJLWycJPuaZjtDQz2tO8NgRQHry0R6Bpo9jjPrY3Ow8VaGiDWEOqYW_m_qy5kRQVHiMqszoaReVLVd37DyGMGtHQG1NClhd5O1mexvI6WfAS1eZoP0j95mvHR4VlkgWVuDuTiph2eCQPtwy8kSZxLwLU5_7IP42RszVL4bT8ogiBuBL47tPxRs-QVY-vmWgclv1hA"/>
                </div>
                <div>
                    <p class="text-sm font-bold text-white">Sarah Jenkins</p>
                    <p class="text-[10px] text-white/50 uppercase tracking-widest">Creative Director</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
