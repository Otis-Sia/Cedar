<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Cedar | Support Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="tailwind-config.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-cedar-alabaster text-cedar-midnight font-body antialiased">
    <nav class="fixed top-0 left-0 w-full z-50 bg-white/80 backdrop-blur-md flex justify-between items-center px-6 md:px-10 py-4 h-20 border-b border-black/5">
        <a href="index.html" class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-cedar-forest flex justify-center items-center text-white font-headline font-bold italic">C</div>
            <div class="font-headline text-2xl font-bold tracking-tight text-cedar-forest">Cedar</div>
        </a>
    </nav>
    <main class="pt-32 pb-20 px-6 max-w-3xl mx-auto min-h-[80vh]">
        <span class="block text-xs uppercase tracking-[0.3em] text-cedar-bronze font-semibold mb-4">Assistance</span>
        <h1 class="font-headline text-4xl md:text-5xl font-bold mb-8">Support Center</h1>
        <div class="bg-white p-8 rounded-3xl border border-black/5 shadow-sm text-cedar-slate space-y-6 leading-relaxed">
            <p>Need help with your portfolio? Our concierge team is ready to assist you.</p>
            <div class="mt-8">
                <h3 class="font-bold text-cedar-midnight text-lg mb-2">Email Us</h3>
                <p>Send an email to <a href="mailto:support@cedar.co" class="text-cedar-forest font-semibold">support@cedar.co</a> for general inquiries or urgent help.</p>
            </div>
            <div class="mt-6">
                <h3 class="font-bold text-cedar-midnight text-lg mb-2">Response Times</h3>
                <p>Elite tier members: <span class="font-semibold text-cedar-midnight">Under 2 hours</span></p>
                <p>All other members: <span class="font-semibold text-cedar-midnight">Within 24 hours</span></p>
            </div>
        </div>
        <div class="mt-8 text-center">
            <a href="index.html" class="inline-flex justify-center items-center bg-cedar-forest text-white px-8 py-4 rounded-full font-semibold text-sm shadow-md hover:bg-cedar-forest-dark transition-all">
                Return to Home
            </a>
        </div>
    </main>
</body>
</html>
