<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Cedar | Reset Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="tailwind-config.js"></script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
</head>
<body class="bg-cedar-alabaster text-cedar-midnight font-body antialiased flex h-screen items-center justify-center">
    <div class="w-full max-w-md bg-white p-10 rounded-[32px] border border-black/5 shadow-xl m-4">
        <a href="index.html" class="flex items-center justify-center gap-3 group mb-8">
            <div class="w-8 h-8 rounded-lg bg-cedar-forest flex justify-center items-center text-white font-headline font-bold italic group-hover:bg-cedar-forest-dark transition-colors">
                C
            </div>
            <div class="font-headline text-2xl font-bold tracking-tight text-cedar-forest">Cedar</div>
        </a>
        
        <div class="text-center mb-8">
            <h1 class="font-headline text-3xl font-bold text-cedar-midnight mb-2">Reset Password</h1>
            <p class="text-cedar-slate text-sm">Enter your email and we'll send you instructions.</p>
        </div>
        
        <form class="space-y-5" action="login.html">
            <div>
                <label class="block text-xs font-bold text-cedar-midnight uppercase tracking-widest mb-2" for="email">Email Address</label>
                <input id="email" type="email" placeholder="hello@example.com" required class="w-full p-4 rounded-xl border border-black/10 bg-cedar-alabaster/50 font-body text-base outline-none focus:border-cedar-bronze focus:ring-4 focus:ring-cedar-bronze/10 transition-all text-cedar-midnight">
            </div>
            <div class="pt-4">
                <button type="submit" class="w-full flex justify-center items-center gap-2 bg-cedar-forest text-white py-4 rounded-xl font-bold text-base shadow-md hover:bg-cedar-forest-dark transition-all">
                    Send Reset Link
                </button>
            </div>
        </form>
        <div class="mt-6 text-center text-sm">
            <a href="login.html" class="font-bold text-cedar-forest hover:underline flex justify-center items-center gap-1">
                <span class="material-symbols-outlined text-[16px]">arrow_back</span>
                Back to Sign In
            </a>
        </div>
    </div>
</body>
</html>
